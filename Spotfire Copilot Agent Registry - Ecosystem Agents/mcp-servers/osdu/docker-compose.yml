# OSDU MCP server — OCI image-pull deployment.
# Copy .env.example to .env first. Endpoints: /mcp, /healthz, /readyz, /versionz.

services:
  mcp-osdu:
    image: ${MCP_IMAGE_REF}
    # Image is built for linux/amd64; pin platform so it runs under emulation
    # on Apple Silicon (arm64) hosts. Override with MCP_PLATFORM if needed.
    platform: ${MCP_PLATFORM:-linux/amd64}
    container_name: mcp-osdu
    env_file:
      - .env
    ports:
      - "${PORT}:${PORT}"
    restart: unless-stopped
